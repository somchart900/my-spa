<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Single Page Application สร้างด้วย Bootstrap, Alpine.js และ HTMX">
    <meta name="theme-color" content="#007bff">
    <title>My SPA App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.0"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Main Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Header Navigation -->
    <header id="navbar-header"></header>

    <!-- Main Content -->
    <main class="flex-fill" id="app-content">
        <div class="text-center py-5">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer id="footer-content"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Application Scripts -->
    <script src="_/js/utils.js"></script>
    <script src="/js/store.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>

    <script>
        function monitorLoader() {
            setTimeout(() => {
                const contentEl = document.getElementById('app-content');
                if (!contentEl) return;

                // แปลง textContent เป็น string แล้วเช็คคำว่า Loading...
                if (contentEl.textContent.includes('Loading...')) {
                    console.warn('Content stuck, redirect to 404');
                    window.app.router.navigate('404');
                }
            }, 300); // รอ 3 วิ
        }
        // เรียก monitor loader หลัง DOM พร้อม
        document.addEventListener('DOMContentLoaded', () => {
            monitorLoader();
        });
    </script>
</body>

</html>
