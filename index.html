<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Single Page Application สร้างด้วย Bootstrap, Alpine.js และ HTMX">
    <meta name="theme-color" content="#007bff">
    <script>
        if (location.protocol !== 'https:') {
            location.replace(`https:${location.href.substring(location.protocol.length)}`);
        }
    </script>
    <!-- Base URL สำหรับ GitHub Pages -->
    <!-- <base href="/my-spa/"> -->

    <title>My SPA App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.0"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Main Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Header Navigation -->
    <header id="navbar-header"></header>

    <!-- Main Content -->
    <main class="flex-fill" id="app-content">
        <div class="text-center py-5">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer id="footer-content"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Initialize the app
        window.app = {
            router: {
                currentPage: 'home',

                navigate: function (page, pushHistory = true) {
                    this.currentPage = page;
                    const contentEl = document.getElementById('app-content');

                    if (!contentEl) {
                        console.error('app-content element not found');
                        return;
                    }

                    // Update URL using History API
                    if (pushHistory) {
                        const url = page === 'home' ? '/' : `/${page}`;
                        window.history.pushState({ page: page }, '', url);
                    }

                    // Update document title
                    const pageTitle = page === 'home' ? 'Home' : page.charAt(0).toUpperCase() + page.slice(1);
                    document.title = `${pageTitle} - My SPA App`;

                    // Load page content
                    const pagePath = `pages/${page}.html`;

                    fetch(pagePath)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error(`HTTP error! status: ${response.status}`);
                            }
                            return response.text();
                        })
                        .then(html => {
                            contentEl.innerHTML = html;
                        })
                        .catch(error => {
                            console.error('Error loading page:', error);
                            contentEl.innerHTML = `<div class="container mt-5"><div class="alert alert-danger" role="alert">Error loading page: ${error.message}</div></div>`;
                        });
                },

                // // Get page from URL
                // getPageFromURL: function () {
                //     const path = window.location.pathname;
                //     if (path === '/' || path === '') {
                //         return 'home';
                //     }
                //     return path.substring(1).split('/')[0];
                // }
                getPageFromURL: function () {
                    const path = window.location.pathname;
                    if (path === '/' || path === '') return 'home';
                    // เอาทุก segment มาต่อด้วย "-"
                    return path.substring(1).replace(/\//g, '-');
                }
            },

            loadComponents: function () {
                // Load header
                fetch('components/header.html')
                    .then(response => response.text())
                    .then(html => {
                        const headerEl = document.getElementById('navbar-header');
                        if (headerEl) {
                            headerEl.innerHTML = html;
                        }
                    })
                    .catch(error => console.error('Error loading header:', error));

                // Load footer
                fetch('components/footer.html')
                    .then(response => response.text())
                    .then(html => {
                        const footerEl = document.getElementById('footer-content');
                        if (footerEl) {
                            footerEl.innerHTML = html;
                        }
                    })
                    .catch(error => console.error('Error loading footer:', error));
            }
        };

        // Handle browser back/forward buttons
        window.addEventListener('popstate', function (event) {
            const page = event.state?.page || window.app.router.getPageFromURL();
            window.app.router.navigate(page, false);
        });

        // Initialize app when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function () {
                window.app.loadComponents();
                const page = window.app.router.getPageFromURL();
                // setTimeout(() => window.app.router.navigate(page, false), 100);
                window.app.router.navigate(page, false);

            });
        } else {
            window.app.loadComponents();
            const page = window.app.router.getPageFromURL();
            // setTimeout(() => window.app.router.navigate(page, false), 100);
            window.app.router.navigate(page, false);

        }
    </script>
    <!-- Application Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/store.js"></script>
    <!-- <script src="js/app.js"></script> -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>

    <script>
        function monitorLoader() {
            setTimeout(() => {
                const contentEl = document.getElementById('app-content');
                if (!contentEl) return;

                // แปลง textContent เป็น string แล้วเช็คคำว่า Loading...
                if (contentEl.textContent.includes('Loading...')) {
                    console.warn('Content stuck, redirect to 404');
                    window.app.router.navigate('404');
                }
            }, 300); // รอ 3 วิ
        }
        // เรียก monitor loader หลัง DOM พร้อม
        document.addEventListener('DOMContentLoaded', () => {
            monitorLoader();
        });
    </script>
</body>

</html>
